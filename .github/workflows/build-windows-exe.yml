name: Build Windows EXE

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --name joymapper gamepad_mapper.py
          if (-not (Test-Path "dist/joymapper.exe")) {
            throw "Build failed: dist/joymapper.exe was not generated."
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: joymapper-windows-exe
          path: dist/joymapper.exe
          if-no-files-found: error

      - name: Attach EXE to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/joymapper.exe
