name: Build Windows EXE

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The tests stub out pygame and keyboard, so no dependencies are needed.
      - name: Run tests
        run: python -m unittest discover -s tests -v

  build-windows-exe:
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # pillow: lets PyInstaller convert icon.png for the EXE icon
          pip install pyinstaller pillow

      # Builds both EXEs (CLI + GUI) into one shared onedir folder.
      # onedir instead of onefile: self-extracting onefile binaries trigger
      # far more antivirus/SmartScreen false positives.
      - name: Build EXEs
        shell: pwsh
        run: |
          pyinstaller joymapper.spec
          foreach ($exe in "joymapper.exe", "joymapper-gui.exe") {
            if (-not (Test-Path "dist/joymapper/$exe")) {
              throw "Build failed: dist/joymapper/$exe was not generated."
            }
          }

      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path dist/joymapper -DestinationPath dist/joymapper-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: joymapper-windows
          path: dist/joymapper-windows.zip
          if-no-files-found: error

      - name: Attach ZIP to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/joymapper-windows.zip
